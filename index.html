<!DOCTYPE html>
<html data-immersive-translate-page-theme="light" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Static Website</title>
    <link href="style.css" rel="stylesheet" type="text/css">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        /* 讓嵌入影片在手機上也能自動縮放的 RWD 寫法 */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 56.25%;
            /* 16:9 比例 */
            margin-top: 20px;
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <p><br></p>
    <center>
        <h1 class="text-center"><a href="https://images.pexels.com/photos/21198651/pexels-photo-21198651.jpeg"><img src="https://myfiles.space/user_files/327416_d977d039c830ec9e/327416_custom_files/img1780626176.jpg"></a></h1>
          <!-- 影片區塊開始 -->
    <div class="iframe-container">
        <iframe 
            src="https://www.youtube.com/embed/irKJYxBRWPc" 
            title="YouTube video player" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            allowfullscreen>
        </iframe>
    </div>
    <!-- 影片區塊結束 -->
        <h2>This **** be the ******** for this website!</h2><button>Login</button>
        <hr>
    </center>
    <p><br></p>

<div style="color: red; font-size: 12px; width: 600px; margin: 0 auto; text-align: center;">Created with <a href="https://wordtohtml.net/">WordToHTML.net</a> trial.</div>
</body>

</html>
